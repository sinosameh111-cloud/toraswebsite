<style>

*{
margin:0;
padding:0;

}

body{

}

::-webkit-scrollbar{

}

background:#C7A84B;

}

::-webkit-scrollbar-track{

background:#111;

}

/* NAVBAR */

nav{

position:fixed;
top:0;
left:0;
width:100%;
height:80px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 60px;
background:rgba(0,0,0,.65);
backdrop-filter:blur(10px);
z-index:999;

}

.logo{

color:#C7A84B;

}

nav ul{

color:white;
font-size:15px;
transition:.3s;

}

nav a:hover{

color:#C7A84B;

}

/* CART */

.cartIcon{

position:relative;
font-size:28px;
cursor:pointer;

}

.cartCount{

position:absolute;
top:-10px;
right:-10px;

background:#C7A84B;
color:black;

width:22px;
height:22px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:12px;
font-weight:bold;

}

/* LANDING */

#landing{

height:100vh;
display:flex;
position:relative;

}

.middleLine{

position:absolute;
left:50%;
top:0;

width:2px;
height:100%;

background:#C7A84B;

box-shadow:

0 0 10px #C7A84B,
0 0 20px #C7A84B;

}

.side{

flex:1;

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;

transition:.5s;

position:relative;

}

.side::before{

content:'';

position:absolute;
top:0;
left:0;

width:100%;
height:100%;

background:rgba(255,255,255,0);

transition:.5s;

}

.side:hover::before{

background:rgba(255,215,0,.05);

}

.side:hover{

transform:scale(1.02);

}

.side h1{

font-family:'Cinzel',serif;

font-size:80px;
letter-spacing:12px;
font-weight:500;

transition:.4s;

}

.side:hover h1{

color:#C7A84B;

text-shadow:

0 0 10px #C7A84B,
0 0 20px #C7A84B;

transform:scale(1.08);

}

/* SHOP */

.shop{

display:none;

padding:140px 60px;

animation:fade .5s;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(40px);

}

to{

opacity:1;
transform:none;

}

}

.title{

font-family:'Cinzel',serif;

font-size:45px;

color:#C7A84B;

margin-bottom:50px;

text-align:center;

}

.products{

display:grid;

grid-template-columns:

repeat(auto-fit,minmax(300px,1fr));

gap:35px;

}

.card{

background:#111;

border:1px solid #C7A84B;

border-radius:18px;

padding:25px;

transition:.4s;

}

.card:hover{

transform:translateY(-10px);

box-shadow:

0 0 25px rgba(199,168,75,.3);

}

.image{

height:260px;

background:#1d1d1d;

border-radius:15px;

display:flex;

align-items:center;

justify-content:center;

font-size:30px;

color:#C7A84B;

margin-bottom:20px;

}

.name{

font-size:24px;

margin-bottom:12px;

}

.price{

font-size:20px;

color:#C7A84B;

margin-bottom:20px;

}

.size{

width:100%;

padding:14px;

background:#181818;

border:1px solid #C7A84B;

color:white;

margin-bottom:15px;

border-radius:10px;

}

.add{

width:100%;

padding:14px;

border:none;

background:#C7A84B;

color:black;

font-weight:bold;

border-radius:10px;

cursor:pointer;

transition:.3s;

}

.add:hover{

transform:scale(1.03);

}

<script>

let cart=[];

let discount=0;

const promoCodes={

YASSIN10:10,

WELCOME15:15,

TORAS20:20

};

function openMen(){

landing.style.display="none";

womenShop.style.display="none";

menShop.style.display="block";

}

function openWomen(){

landing.style.display="none";

menShop.style.display="none";

womenShop.style.display="block";

}

function goHome(){

landing.style.display="flex";

menShop.style.display="none";

womenShop.style.display="none";

}

function toggleCart(){

cart.classList.toggle("active");

}

function addProduct(name,btn){

let select=btn.parentElement.querySelector(".size");

let price=Number(select.value);

let size=select.options[select.selectedIndex].text;

cart.push({

name,

price,

size

});

updateCart();

}

function updateCart(){

let html="";

let total=0;

cart.forEach(item=>{

html+=`

<div class="cartItem">

<div>

<b>${item.name}</b>

<br>

${item.size}

</div>

<div>

${item.price} EGP

</div>

</div>

`;

total+=item.price;

});

total=total-(total*discount/100);

document.getElementById("cartItems").innerHTML=html||"Your cart is empty.";

document.getElementById("total").innerHTML=total;

document.getElementById("cartCount").innerHTML=cart.length;

}

function applyPromo(){

let code=document.getElementById("promoCode").value.toUpperCase();

if(promoCodes[code]){

discount=promoCodes[code];

alert("Promo Applied! "+discount+"% OFF");

}else{

discount=0;

alert("Invalid Promo Code");

}

updateCart();

}
<!-- ========================= -->
<!-- PART 4A / 4 -->
<!-- Continue after Part 3 -->
<!-- ========================= -->

const SERVICE_ID="service_3okjoac";
const PUBLIC_KEY="5bfxJmBRr2Tv4w7ja";
const TEMPLATE_ID="PUT_YOUR_TEMPLATE_ID_HERE";

emailjs.init(PUBLIC_KEY);

function checkout(){

if(cart.length==0){

alert("Your cart is empty.");

return;

}

let form=`

<div id="checkoutBox"

style="

position:fixed;
top:50%;
left:50%;

transform:translate(-50%,-50%);

background:#111;

padding:30px;

width:420px;

border:2px solid #C7A84B;

border-radius:18px;

z-index:9999;

">

<h2 style="color:#C7A84B">

Checkout

</h2>

<input id="cName"

placeholder="Full Name"

style="width:100%;
padding:12px;
margin-top:15px;">

<input id="cPhone"

placeholder="Phone Number"

style="width:100%;
padding:12px;
margin-top:12px;">

<input id="cEmail"

placeholder="Email"

style="width:100%;
padding:12px;
margin-top:12px;">

<input id="cAddress"

placeholder="Address"

style="width:100%;
padding:12px;
margin-top:12px;">

<button

onclick="sendOrder()"

style="

width:100%;
margin-top:20px;
padding:14px;
background:#C7A84B;
border:none;
cursor:pointer;

">

Place Order

</button>

</div>

`;

document.body.insertAdjacentHTML("beforeend",form);

}

function sendOrder(){

let items="";

let total=0;

cart.forEach(p=>{

items+=

p.name+

" | "+

p.size+

" | "+

p.price+

" EGP\n";

total+=p.price;

});

total=total-(total*discount/100);

emailjs.send(

SERVICE_ID,

TEMPLATE_ID,

{

name:

document.getElementById("cName").value,

phone:

document.getElementById("cPhone").value,

email:

document.getElementById("cEmail").value,

address:

document.getElementById("cAddress").value,

items:items,

total:total

}

)
.then(()=>{
    alert("Order sent successfully!");

cart=[];

discount=0;

document.getElementById("promoCode").value="";

updateCart();

document.getElementById("checkoutBox").remove();

})

.catch((error)=>{

alert("Failed to send order.");

console.log(error);

});

}

</script>

<script
src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
