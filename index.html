<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>


<script>


emailjs.init("5bfxJmBRr2Tv4w7ja");


const SERVICE_ID="service_3okjoac";

const TEMPLATE_ID="template_z22dy7i";


let cart=[];

let discount=0;



const promoCodes={

YASSIN10:10,

WELCOME15:15,

TORAS20:20,

ME:90

};





function toggleCart(){

document
.getElementById("cart")
.classList
.toggle("active");

}





function showMen(){

document.getElementById("landing").style.display="none";

document.getElementById("women").style.display="none";

document.getElementById("men").style.display="block";

}





function showWomen(){

document.getElementById("landing").style.display="none";

document.getElementById("men").style.display="none";

document.getElementById("women").style.display="block";

}





function goHome(){

document.getElementById("landing").style.display="flex";

document.getElementById("men").style.display="none";

document.getElementById("women").style.display="none";

}





function addToCart(name,button){


const select =
button.parentElement.querySelector("select");


const price =
Number(select.value);


const size =
select.options[select.selectedIndex].text;



const item =
cart.find(
x=>x.name===name && x.size===size
);



if(item){

item.qty++;

}

else{


cart.push({

name:name,

size:size,

price:price,

qty:1

});


}



saveCart();

renderCart();


}





function renderCart(){


const cartItems=
document.getElementById("cartItems");


const totalElement=
document.getElementById("total");


const cartCount=
document.getElementById("cartCount");



let html="";

let totalPrice=0;



cart.forEach((item,index)=>{


html+=`

<div class="cartItem">


<b>${item.name}</b>

<br>

${item.size}

<br>

${item.price} EGP


<br><br>


<button onclick="minus(${index})">
-
</button>


${item.qty}


<button onclick="plus(${index})">
+
</button>


<button onclick="removeItem(${index})">
Remove
</button>


</div>


`;



totalPrice += item.price * item.qty;


});



let finalTotal =
totalPrice-(totalPrice*(discount/100));



cartItems.innerHTML =
html || "Your cart is empty.";


totalElement.textContent =
finalTotal.toFixed(0);



cartCount.textContent =
cart.reduce((a,b)=>a+b.qty,0);



}


function plus(i){

cart[i].qty++;

saveCart();

renderCart();

}



function minus(i){

cart[i].qty--;


if(cart[i].qty<=0){

cart.splice(i,1);

}


saveCart();

renderCart();

}



function removeItem(i){

cart.splice(i,1);

saveCart();

renderCart();

}




function applyPromo(){


const code =
document.getElementById("promo")
.value
.trim()
.toUpperCase();



if(promoCodes[code]){


discount =
promoCodes[code];


alert("Promo code applied!");


}

else{


discount=0;


alert("Invalid promo code.");


}


renderCart();


}





function saveCart(){

localStorage.setItem(
"torasCart",
JSON.stringify(cart)
);

}





window.addEventListener("load",()=>{


const saved =
localStorage.getItem("torasCart");



if(saved){

cart =
JSON.parse(saved);

renderCart();

}


});





function checkout(){



if(cart.length===0){


alert("Your cart is empty.");

return;


}





if(document.getElementById("checkoutPopup")){

document.getElementById("checkoutPopup").remove();

}





const popup = `



<div id="checkoutPopup"

style="

position:fixed;

top:50%;

left:50%;

transform:translate(-50%,-50%);

width:420px;

background:#111;

padding:25px;

border:2px solid #c9a24d;

border-radius:20px;

z-index:9999;

">



<h2 style="color:#c9a24d;text-align:center;font-family:Cinzel;">

Checkout

</h2>



<input id="customerName" placeholder="Full Name">


<input id="customerPhone" placeholder="Phone Number">


<input id="customerEmail" placeholder="Email">


<input id="customerAddress" placeholder="Address">



<button onclick="placeOrder()">

Place Order

</button>




<button 

onclick="document.getElementById('checkoutPopup').remove()"

style="background:#333;color:white;">

Cancel

</button>



</div>



`;



document.body.insertAdjacentHTML(
"beforeend",
popup
);



}







function placeOrder(){


let items="";

let totalPrice=0;



cart.forEach(item=>{


items +=

`${item.name}
${item.size}
Quantity: ${item.qty}
Price: ${item.price} EGP

`;



totalPrice += item.price * item.qty;


});





const finalTotal =

totalPrice-(totalPrice*(discount/100));






emailjs.send(

SERVICE_ID,

TEMPLATE_ID,


{


customer_name:

document.getElementById("customerName").value,


customer_phone:

document.getElementById("customerPhone").value,


customer_email:

document.getElementById("customerEmail").value,


customer_address:

document.getElementById("customerAddress").value,


items:items,


discount:

discount+"%",


total:

finalTotal


}


)

.then(()=>{


alert("Order Sent Successfully!");



cart=[];

discount=0;


localStorage.removeItem("torasCart");


renderCart();



document
.getElementById("checkoutPopup")
.remove();



})

.catch(error=>{


console.error(error);


alert("Order failed.");


});



}

<!-- CARD ANIMATION -->


<script>


document
.querySelectorAll(".card")
.forEach(card=>{


card.style.opacity="0";

card.style.transform="translateY(40px)";

card.style.transition=".6s";


});




const observer =

new IntersectionObserver(entries=>{


entries.forEach(entry=>{


if(entry.isIntersecting){


entry.target.style.opacity="1";

entry.target.style.transform="translateY(0)";


}


});


});





document
.querySelectorAll(".card")
.forEach(card=>{


observer.observe(card);


});



</script><!-- EXTRA FUNCTIONS -->


<script>


// ESC closes cart and checkout popup

document.addEventListener("keydown",function(e){


if(e.key==="Escape"){



document
.getElementById("cart")
.classList
.remove("active");



const popup =
document.getElementById("checkoutPopup");



if(popup){

popup.remove();

}


}


});






// Close cart when clicking outside


document.addEventListener("click",function(e){


const cartBox =
document.getElementById("cart");


const cartButton =
document.querySelector(".cartButton");



if(

cartBox.classList.contains("active")

&&

!cartBox.contains(e.target)

&&

!cartButton.contains(e.target)

){


cartBox.classList.remove("active");


}



});





// Luxury loading screen


window.addEventListener("load",()=>{


const loader =
document.createElement("div");



loader.style.position="fixed";

loader.style.top="0";

loader.style.left="0";

loader.style.width="100%";

loader.style.height="100%";

loader.style.background="#050505";

loader.style.alignItems="center";

loader.style.justifyContent="center";

loader.style.fontFamily="Cinzel";

loader.style.fontSize="45px";

loader.style.color="#c9a24d";

loader.style.zIndex="99999";

loader.innerHTML="TORAS";



document.body.appendChild(loader);




setTimeout(()=>{


loader.style.opacity="0";

loader.style.transition=".5s";



setTimeout(()=>{


loader.remove();



},500);



},1000);



});




</script>
